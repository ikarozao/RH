<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Uniformes - Opção Telecom</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a2e;
            min-height: 100vh;
            padding: 24px 16px;
        }

        .container { max-width: 680px; margin: 0 auto; }

        header {
            text-align: center;
            color: white;
            margin-bottom: 28px;
        }

        header h1 { font-size: 1.7em; letter-spacing: 1px; }
        header p { opacity: 0.7; font-size: 0.9em; margin-top: 4px; }

        .card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.25);
        }

        .card h3 {
            font-size: 1em;
            color: #333;
            margin-bottom: 18px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .url-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }

        .url-bar input {
            flex: 1;
            padding: 10px 12px;
            border: 1.5px solid #ddd;
            border-radius: 8px;
            font-size: 13px;
            font-family: monospace;
            color: #333;
        }

        .url-bar input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn-salvar-url {
            padding: 10px 16px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            white-space: nowrap;
        }

        .url-status {
            font-size: 12px;
            padding: 6px 10px;
            border-radius: 6px;
            margin-top: 4px;
        }

        .url-status.ok { background: #e8f5e9; color: #2e7d32; }
        .url-status.vazio { background: #fff3e0; color: #e65100; }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .form-group { margin-bottom: 13px; }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 700;
            color: #666;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1.5px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            color: #333;
            background: #fafafa;
            transition: border-color 0.2s;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
            background: white;
        }

        .radio-group {
            display: flex;
            gap: 10px;
        }

        .radio-btn {
            flex: 1;
            padding: 10px;
            border: 1.5px solid #e0e0e0;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.2s;
            background: #fafafa;
            color: #666;
            user-select: none;
        }

        .radio-btn.entrada.ativo {
            background: #e8f5e9;
            border-color: #4caf50;
            color: #2e7d32;
        }

        .radio-btn.saida.ativo {
            background: #ffebee;
            border-color: #f44336;
            color: #c62828;
        }

        .btn-enviar {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 6px;
            letter-spacing: 0.5px;
            transition: all 0.2s;
        }

        .btn-enviar:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(102,126,234,0.4); }
        .btn-enviar:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        .log {
            max-height: 220px;
            overflow-y: auto;
            margin-top: 12px;
        }

        .log-item {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 8px 0;
            border-bottom: 1px solid #f0f0f0;
            font-size: 13px;
        }

        .log-item:last-child { border-bottom: none; }

        .log-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-top: 4px;
            flex-shrink: 0;
        }

        .log-dot.ok { background: #4caf50; }
        .log-dot.erro { background: #f44336; }
        .log-dot.enviando { background: #ff9800; animation: pulse 1s infinite; }

        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

        .log-text { color: #444; line-height: 1.4; }
        .log-hora { color: #aaa; font-size: 11px; }

        .empty-log { color: #aaa; text-align: center; padding: 20px; font-size: 13px; }

        /* iframe oculto para envio */
        #hidden_iframe { display: none; }

        .instrucoes {
            background: #f0f4ff;
            border: 1px solid #c5cff7;
            border-radius: 10px;
            padding: 14px 16px;
            margin-bottom: 16px;
            font-size: 13px;
            color: #3d4b8a;
            line-height: 1.6;
        }

        .instrucoes strong { display: block; margin-bottom: 6px; font-size: 14px; }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>🎽 CONTROLE DE UNIFORMES</h1>
        <p>Opção Telecom</p>
    </header>

    <!-- Config URL -->
    <div class="card">
        <h3>⚙️ Configuração da Planilha</h3>
        <div class="url-bar">
            <input type="text" id="inputUrl" placeholder="Cole aqui a URL do seu Apps Script..." />
            <button class="btn-salvar-url" onclick="salvarUrl()">Salvar</button>
        </div>
        <div id="urlStatus" class="url-status vazio">⚠️ URL não configurada — cole a URL do seu Apps Script acima</div>
    </div>

    <!-- Formulário -->
    <div class="card">
        <h3>📝 Registrar Movimentação</h3>

        <div class="grid-2">
            <div class="form-group">
                <label>Tipo de Uniforme *</label>
                <select id="uniformeTipo" required>
                    <option value="">Selecione...</option>
                    <option>Camiseta Manga Curta</option>
                    <option>Camiseta Manga Longa</option>
                    <option>Calça</option>
                    <option>Jaqueta</option>
                    <option>Bermuda</option>
                    <option>Touca</option>
                    <option>Luvas</option>
                    <option>Colete</option>
                    <option>Capacete</option>
                </select>
            </div>
            <div class="form-group">
                <label>Tamanho *</label>
                <select id="tamanho" required>
                    <option value="">Selecione...</option>
                    <option>PP</option><option>P</option><option>P Feminino</option>
                    <option>M</option><option>M Feminino</option>
                    <option>G</option><option>G Feminino</option>
                    <option>GG</option><option>GG Feminino</option>
                    <option>XGG</option><option>Único</option>
                </select>
            </div>
        </div>

        <div class="grid-2">
            <div class="form-group">
                <label>Local / Setor *</label>
                <input type="text" id="local" placeholder="Ex: Almoxarifado, Obra SP" required>
            </div>
            <div class="form-group">
                <label>Quantidade *</label>
                <input type="number" id="quantidade" min="1" value="1" required>
            </div>
        </div>

        <div class="grid-2">
            <div class="form-group">
                <label>Destinatário *</label>
                <input type="text" id="destinatario" placeholder="Nome do colaborador" required>
            </div>
            <div class="form-group">
                <label>Data *</label>
                <input type="date" id="data" required>
            </div>
        </div>

        <div class="form-group">
            <label>Tipo de Movimento *</label>
            <div class="radio-group">
                <div class="radio-btn entrada ativo" id="btnEntrada" onclick="setMovimento('entrada')">📥 ENTRADA</div>
                <div class="radio-btn saida" id="btnSaida" onclick="setMovimento('saida')">📤 SAÍDA</div>
            </div>
            <input type="hidden" id="tipoMovimento" value="entrada">
        </div>

        <div class="form-group">
            <label>Observação</label>
            <textarea id="observacao" rows="2" placeholder="Informações adicionais..."></textarea>
        </div>

        <button class="btn-enviar" id="btnEnviar" onclick="enviarRegistro()">💾 SALVAR NA PLANILHA</button>
    </div>

    <!-- Log -->
    <div class="card">
        <h3>📋 Histórico de Envios</h3>
        <div class="log" id="log">
            <div class="empty-log">Nenhum registro enviado ainda</div>
        </div>
    </div>
</div>

<!-- iframe oculto — método que bypassa o CORS -->
<iframe name="hidden_iframe" id="hidden_iframe"></iframe>

<!-- form oculto que realmente envia os dados -->
<form id="formOculto" method="POST" target="hidden_iframe" style="display:none">
    <input type="hidden" name="data" id="f_data">
    <input type="hidden" name="uniforme_tipo" id="f_uniforme_tipo">
    <input type="hidden" name="tamanho" id="f_tamanho">
    <input type="hidden" name="local" id="f_local">
    <input type="hidden" name="quantidade" id="f_quantidade">
    <input type="hidden" name="destinatario" id="f_destinatario">
    <input type="hidden" name="tipo_movimento" id="f_tipo_movimento">
    <input type="hidden" name="observacao" id="f_observacao">
    <input type="hidden" name="timestamp" id="f_timestamp">
</form>

<script>
    let tipoMovimento = 'entrada';

    function setMovimento(tipo) {
        tipoMovimento = tipo;
        document.getElementById('tipoMovimento').value = tipo;
        document.getElementById('btnEntrada').className = 'radio-btn entrada' + (tipo === 'entrada' ? ' ativo' : '');
        document.getElementById('btnSaida').className = 'radio-btn saida' + (tipo === 'saida' ? ' ativo' : '');
    }

    function salvarUrl() {
        const url = document.getElementById('inputUrl').value.trim();
        if (!url.startsWith('https://script.google.com')) {
            alert('URL inválida. Use a URL do Apps Script (começa com https://script.google.com)');
            return;
        }
        localStorage.setItem('apps_script_url', url);
        atualizarStatusUrl(url);
        alert('✅ URL salva!');
    }

    function atualizarStatusUrl(url) {
        const el = document.getElementById('urlStatus');
        if (url) {
            el.className = 'url-status ok';
            el.textContent = '✅ Conectado: ' + url.substring(0, 60) + '...';
        } else {
            el.className = 'url-status vazio';
            el.textContent = '⚠️ URL não configurada — cole a URL do seu Apps Script acima';
        }
    }

    function adicionarLog(texto, tipo) {
        const log = document.getElementById('log');
        const empty = log.querySelector('.empty-log');
        if (empty) empty.remove();

        const agora = new Date();
        const hora = agora.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });

        const item = document.createElement('div');
        item.className = 'log-item';
        item.innerHTML = `
            <div class="log-dot ${tipo}"></div>
            <div>
                <div class="log-text">${texto}</div>
                <div class="log-hora">${hora}</div>
            </div>
        `;
        log.insertBefore(item, log.firstChild);
    }

    function enviarRegistro() {
        const url = localStorage.getItem('apps_script_url');
        if (!url) {
            alert('⚠️ Configure a URL do Apps Script primeiro!');
            return;
        }

        const tipo = document.getElementById('uniformeTipo').value;
        const tamanho = document.getElementById('tamanho').value;
        const local = document.getElementById('local').value.trim();
        const qtd = document.getElementById('quantidade').value;
        const dest = document.getElementById('destinatario').value.trim();
        const data = document.getElementById('data').value;

        if (!tipo || !tamanho || !local || !qtd || !dest || !data) {
            alert('❌ Preencha todos os campos obrigatórios!');
            return;
        }

        // Preenche o form oculto
        document.getElementById('f_data').value = data;
        document.getElementById('f_uniforme_tipo').value = tipo;
        document.getElementById('f_tamanho').value = tamanho;
        document.getElementById('f_local').value = local;
        document.getElementById('f_quantidade').value = qtd;
        document.getElementById('f_destinatario').value = dest;
        document.getElementById('f_tipo_movimento').value = tipoMovimento;
        document.getElementById('f_observacao').value = document.getElementById('observacao').value || '';
        document.getElementById('f_timestamp').value = new Date().toISOString();

        // Define a action do form com a URL
        document.getElementById('formOculto').action = url;

        const btn = document.getElementById('btnEnviar');
        btn.disabled = true;
        btn.textContent = '⏳ Enviando...';

        adicionarLog(`Enviando: ${tipo} (${tamanho}) — ${dest}`, 'enviando');

        // Submete via iframe (sem CORS)
        document.getElementById('formOculto').submit();

        // Após 3s assume que foi com sucesso (o iframe não retorna resposta visível)
        setTimeout(() => {
            btn.disabled = false;
            btn.textContent = '💾 SALVAR NA PLANILHA';

            // Atualiza o log
            const dots = document.querySelectorAll('.log-dot.enviando');
            dots.forEach(d => d.className = 'log-dot ok');

            adicionarLog(`✅ Enviado: ${tipo} ${tamanho} | ${dest} | ${tipoMovimento.toUpperCase()} | ${qtd} unid.`, 'ok');

            // Limpa o formulário
            document.getElementById('uniformeTipo').value = '';
            document.getElementById('tamanho').value = '';
            document.getElementById('local').value = '';
            document.getElementById('quantidade').value = '1';
            document.getElementById('destinatario').value = '';
            document.getElementById('observacao').value = '';
            document.getElementById('data').valueAsDate = new Date();
            setMovimento('entrada');
        }, 3000);
    }

    // Ao carregar
    document.getElementById('data').valueAsDate = new Date();
    const urlSalva = localStorage.getItem('apps_script_url');
    if (urlSalva) {
        document.getElementById('inputUrl').value = urlSalva;
        atualizarStatusUrl(urlSalva);
    }
</script>
</body>
</html>
